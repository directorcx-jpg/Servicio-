name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials into index.html
        run: |
          sed -i 's|<meta name="supabase-url" content="">|<meta name="supabase-url" content="${{ secrets.SUPABASE_URL }}">|' index.html
          sed -i 's|<meta name="supabase-anon-key" content="">|<meta name="supabase-anon-key" content="${{ secrets.SUPABASE_ANON_KEY }}">|' index.html

      - name: Verify injection
        run: |
          if grep -q 'content=""' index.html; then
            echo "ERROR: Credentials injection failed. Check secret names."
            exit 1
          fi
          echo "Credentials injected successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
